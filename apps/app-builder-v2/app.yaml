app_name: app-builder-v2

# ═══════════════════════════════════════════════════════════════
# 设计约定（基于架构蓝图 v3 — pure-arch-design 产出）
# ═══════════════════════════════════════════════════════════════
#
# 版本: v2 — 实现型 APP 构建器（照图施工）
# 设计目标: 将上游 pure-arch-design 产出的架构蓝图（Markdown）
#           填充为完整可运行的多角色 APP 包。
#           不做架构设计、不做拓扑决策——拓扑决策全部来自上游蓝图。
#
# 核心主线（五项阶段能力）:
#   蓝图解析 → 结构生成 → skill/knowledge 填充 → 验证 → 终审
#
# §1  四层架构 × 角色映射（蓝图 §2.1）
#     L1 解析层 → 蓝图解析师（封闭层，职责单一不可扩展）
#     L2 生成层 → 结构生成师（封闭层）
#     L3 填充层 → Skill填充师 ∥ Knowledge填充师（开放层，FORK-JOIN 并行度 2）
#     L4 校验层 → 编译预检师 → 忠实度/完整性/一致性红队（并行度 3）→ 终审裁决者（开放层）
#
# §2  编排拓扑（蓝图 §4.1）
#     M1 → M2 → FORK[M3, M4] → JOIN → M5 → FORK[M6, M7, M8] → JOIN → M9 → 完成
#
# §3  控制流回退（蓝图 §2.2，引擎 verdict 路由）
#     a) M5 编译预检 fail_compile → 回退 L3（M3/M4 重跑），max_executions: 3
#        回退不收敛兜底：rollback_counter > 3 → 引擎转发 M9 标注 consistency_defect
#     b) M9 终审 fail_consistency → 回退 L3（M3/M4 重跑），max_executions: 3
#     c) M9 终审 consistency_defect → 完成（不可恢复缺陷终态退出）
#
# §4  并行兼容性（蓝图 §4.2）
#     填充阶段: M3 ∥ M4 = 并行度 2（写目录隔离: M3 写 roles/，M4 写 knowledge/）
#     校验阶段: M6 ∥ M7 ∥ M8 = 并行度 3（只读 APP 包，各自产出独立问题清单）
#     全拓扑最大并行度 = max(2, 3) = 3 ≤ 3（引擎可靠并行上限）
#
# §5  产出物路径契约（蓝图 §3.2）
#     · 内部蓝图模型 → process/outputs/内部蓝图模型.json
#     · 目标 APP 结构文件 → app.yaml / manifest.json / ROUTER.json / registry.json
#     · 目标 APP 角色文件 → roles/{角色}/skill.md + schema.json
#     · 目标 APP 知识文档 → knowledge/{知识名}.md
#     · 编译预检报告 → process/outputs/编译预检报告.json
#     · 三红队问题清单 → process/outputs/R1|R2|R3-问题清单.json
#     · 终审裁决书 → outputs/终审裁决书.json
#
# §6  verdict 命名约定
#     · confirmed    — 正向通过（无条件边默认）
#     · fail_compile — 编译预检发现结构缺陷（backward，M5 专属）
#     · fail_consistency — 终审发现一致性问题（backward，M9 专属）
#     · consistency_defect — 不可恢复缺陷（normal→完成，M9 兜底）
#     注：fail_ 前缀由编译器识别为 backward 回退边
# ═══════════════════════════════════════════════════════════════

knowledge:
  - 高质量APP产出原则: knowledge/高质量APP产出原则.md
    inject_to: [蓝图解析师, 结构生成师, Skill填充师, Knowledge填充师, 忠实度红队, 完整性红队, 一致性红队, 终审裁决者]
  - 蓝图解析规范: knowledge/蓝图解析规范.md
    inject_to: [蓝图解析师]
  - APP包结构规范: knowledge/APP包结构规范.md
    inject_to: [结构生成师, 编译预检师]
  - skill编写指南: knowledge/skill编写指南.md
    inject_to: [Skill填充师]
  - knowledge编写指南: knowledge/knowledge编写指南.md
    inject_to: [Knowledge填充师]
  - 对抗校验准则: knowledge/对抗校验准则.md
    inject_to: [忠实度红队, 完整性红队, 一致性红队]
  - SDK规范: knowledge/SDK_SPEC.md
    inject_to: [编译预检师, 终审裁决者]

roles:
  # ═══ L1 解析层（封闭层）═══
  # 入口角色，confirm: manual（用户需确认蓝图已就绪）
  # 读取上游架构蓝图，解析为内部结构模型供下游消费
  蓝图解析师:
    confirm: manual
    inputs:
      - 架构蓝图: outputs/架构蓝图.md
    outputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json

  # ═══ L2 生成层（封闭层）═══
  # 依据内部模型生成目标 APP 的 4 个结构骨架文件
  结构生成师:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
    outputs:
      - 目标APP架构文件: app.yaml
      - 目标APP清单: manifest.json
      - 目标APP路由: ROUTER.json
      - 目标APP注册表: registry.json

  # ═══ L3 填充层（开放层，FORK-JOIN 并行度 2）═══
  # 为目标 APP 每个角色产出 skill.md + schema.json
  Skill填充师:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
      - 目标APP架构文件: app.yaml
      - 目标APP路由: ROUTER.json
    outputs:
      - 技能填充报告: process/outputs/技能填充报告.json
      - 角色文件树: roles/

  # 为目标 APP 每个角色产出领域知识文档
  Knowledge填充师:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
      - 目标APP架构文件: app.yaml
    outputs:
      - 知识填充报告: process/outputs/知识填充报告.json
      - 知识文档: knowledge/

  # ═══ L4 校验层·编译预检子阶段 ═══
  # 对填充后的完整 APP 包执行 compiler.py --check 编译级预检
  编译预检师:
    confirm: auto
    inputs:
      - 目标APP架构文件: app.yaml
      - 目标APP清单: manifest.json
      - 目标APP路由: ROUTER.json
      - 目标APP注册表: registry.json
      - 技能填充报告: process/outputs/技能填充报告.json
      - 知识填充报告: process/outputs/知识填充报告.json
    outputs:
      - 编译预检报告: process/outputs/编译预检报告.json

  # ═══ L4 校验层·语义对抗子阶段（并行度 3）═══
  # 忠实度维度：验证 skill 内容是否忠实于蓝图角色职责描述
  忠实度红队:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
      - 角色文件树: roles/
    outputs:
      - 忠实度问题清单: process/outputs/R1-问题清单.json

  # 完整性维度：验证蓝图声明的角色/knowledge/产出物是否都已生成
  完整性红队:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
      - 角色文件树: roles/
      - 知识文档: knowledge/
    outputs:
      - 完整性问题清单: process/outputs/R2-问题清单.json

  # 一致性维度：验证 skill 间引用路径/verdict 名称是否一致
  一致性红队:
    confirm: auto
    inputs:
      - 内部蓝图模型: process/outputs/内部蓝图模型.json
      - 角色文件树: roles/
      - 目标APP路由: ROUTER.json
    outputs:
      - 一致性问题清单: process/outputs/R3-问题清单.json

  # ═══ L4 校验层·全局治理 ═══
  # 3 红队全过后做全局一致性终审 + 死循环兜底
  终审裁决者:
    confirm: auto
    inputs:
      - 编译预检报告: process/outputs/编译预检报告.json
      - 忠实度问题清单: process/outputs/R1-问题清单.json
      - 完整性问题清单: process/outputs/R2-问题清单.json
      - 一致性问题清单: process/outputs/R3-问题清单.json
    outputs:
      - 终审裁决书: outputs/终审裁决书.json

edges:
  # ═══ L1 → L2：蓝图解析 → 结构生成 ═══
  - 蓝图解析师 → 结构生成师

  # ═══ L2 → L3 (FORK 扇出)：结构生成 → 并行填充 ═══
  - 结构生成师 → [Skill填充师, Knowledge填充师]

  # ═══ L3 → L4 (JOIN 汇入)：两填充师完成后汇入编译预检 ═══
  - [Skill填充师, Knowledge填充师] → 编译预检师

  # ═══ M5 编译预检师 ═══
  # confirmed → FORK 三红队（并行度 3，蓝图 §4.1）
  - 编译预检师 → [忠实度红队, 完整性红队, 一致性红队] when: result.verdict == "confirmed"
  # fail_compile → 回退 L3 填充层重跑（max_executions: 3，蓝图 §2.2 循环终止条件）
  - 编译预检师 → Skill填充师 when: result.verdict == "fail_compile" max_executions: 3
  - 编译预检师 → Knowledge填充师 when: result.verdict == "fail_compile" max_executions: 3

  # ═══ L4 三红队 → M9 (JOIN 汇入)：三红队完成后汇入终审 ═══
  - [忠实度红队, 完整性红队, 一致性红队] → 终审裁决者

  # ═══ M9 终审裁决者（蓝图 §3.6.9）═══
  # confirmed → 完成（终审通过，APP 包合格）
  - 终审裁决者 → 完成 when: result.verdict == "confirmed"
  # consistency_defect → 完成（不可恢复缺陷/回退不收敛兜底，终态退出）
  - 终审裁决者 → 完成 when: result.verdict == "consistency_defect"
  # fail_consistency → 回退 L3 填充层修复（max_executions: 3）
  - 终审裁决者 → Skill填充师 when: result.verdict == "fail_consistency" max_executions: 3
  - 终审裁决者 → Knowledge填充师 when: result.verdict == "fail_consistency" max_executions: 3
